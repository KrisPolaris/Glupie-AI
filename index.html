<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systematyczne AI</title>
    <style>
        body {
            background: #050505;
            color: #00ffcc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        header {
            padding: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00ffcc;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-align: center;
        }

        #chat-window {
            flex: 1;
            width: 90%;
            max-width: 600px;
            background: #111;
            border: 2px solid #00ffcc;
            border-radius: 15px;
            margin-bottom: 20px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: inset 0 0 15px #000, 0 0 20px rgba(0, 255, 204, 0.1);
            display: flex;
            flex-direction: column;
        }

        .msg {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user-msg {
            background: #003322;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            border-right: 4px solid #00ffcc;
        }

        .ai-msg {
            background: #222;
            color: #00ffcc;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border-left: 4px solid #00ffcc;
        }

        #input-area {
            width: 90%;
            max-width: 600px;
            display: flex;
            gap: 10px;
            padding-bottom: 20px;
        }

        input {
            flex: 1;
            background: #111;
            border: 1px solid #00ffcc;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            background: #fff;
            box-shadow: 0 0 20px #00ffcc;
            transform: scale(1.05);
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* Styl dla bloku kodu bota */
        pre {
            background: #000;
            color: #00ff00;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        /* Scrollbar Style */
        #chat-window::-webkit-scrollbar {
            width: 6px;
        }
        #chat-window::-webkit-scrollbar-thumb {
            background: #00ffcc;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<header>systematyczne ai co zastąpi ludzi</header>

<div id="chat-window">
    <div class="msg ai-msg">siema (czego chcesz)</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Napisz do AI..." autocomplete="off">
    <button onclick="sendMessage()">WYŚLIJ</button>
</div>

const chatWindow = document.getElementById("chat-window");
const inputField = document.getElementById("userInput");

function sendMessage() {
    const rawText = inputField.value.trim();
    if (rawText === "") return;

    const lowerText = rawText.toLowerCase();

    addMessage(rawText, "user-msg");
    inputField.value = "";

    setTimeout(() => {
        let response = findResponse(lowerText);
        addMessage(response, "ai-msg");
    }, 400);
}

function findResponse(userInput) {
    for (let key in botDatabase) {
        if (userInput.includes(key) && key !== "default") {
            const options = botDatabase[key];
            return options[Math.floor(Math.random() * options.length)];
        }
    }
    const defaults = botDatabase["default"];
    return defaults[Math.floor(Math.random() * defaults.length)];
}

function addMessage(text, className) {
    const div = document.createElement("div");
    div.className = "msg " + className;
    div.innerHTML = text;
    chatWindow.appendChild(div);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

inputField.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
